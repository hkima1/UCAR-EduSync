<!DOCTYPE html>
<html>
<body>
  <img id="logo" src="UCAR_logo.png" style="display:none;" />
  <div id="results"></div>
  <script>
    document.getElementById('logo').onload = function() {
      const img = this;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      
      const colors = {};
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
        if (a < 10) continue; // skip transparent
        if (r > 240 && g > 240 && b > 240) continue; // skip white
        if (r < 15 && g < 15 && b < 15) continue; // skip black
        
        // Quantize colors to reduce noise (e.g. step of 16)
        const qR = Math.round(r/10)*10, qG = Math.round(g/10)*10, qB = Math.round(b/10)*10;
        const key = `${qR},${qG},${qB}`;
        colors[key] = (colors[key] || 0) + 1;
      }
      
      const sorted = Object.entries(colors).sort((a,b) => b[1] - a[1]).slice(0, 5);
      
      const resultsDiv = document.getElementById('results');
      sorted.forEach(([rgb, count]) => {
        const [r, g, b] = rgb.split(',');
        const hex = "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
        resultsDiv.innerHTML += `<div>Color: rgb(${r},${g},${b}) | Hex: ${hex} | Count: ${count}</div>`;
      });
      document.body.innerHTML += "<div id='done'>DONE</div>";
    }
  </script>
</body>
</html>
